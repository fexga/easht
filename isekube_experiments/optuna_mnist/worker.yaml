---
apiVersion: batch/v1
kind: Job
metadata:
  name: worker
  namespace: st-felixgraf2
spec:
  parallelism: 3
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - ise-knode6
      restartPolicy: OnFailure
      containers:
        - name: worker
          image: docker.io/gafex/optuna-mnist:ise-kube
          imagePullPolicy: Always
          command:
            - python
            - pytorch_lightning_distributed.py
          resources:
            requests:
              memory: "1000Mi"
              cpu: "1000m"
            limits:
              memory: "1000Mi"
              cpu: "1000m"
          envFrom:
            - secretRef:
                name: postgres-secrets
            - configMapRef:
                name: training-config
---