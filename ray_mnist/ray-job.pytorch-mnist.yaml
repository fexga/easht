apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: rayjob-pytorch-mnist
spec:
  shutdownAfterJobFinishes: false
  entrypoint: python /app/script.py 
  runtimeEnvYAML: |
    pip:
      - torch
      - torchvision
      - kubernetes
      - python-dotenv
    env_vars:
      NUM_WORKERS: "2"
      CPUS_PER_WORKER: "1"

  # rayClusterSpec specifies the RayCluster instance to be created by the RayJob controller.
  rayClusterSpec:
    rayVersion: '2.41.0'
    headGroupSpec:
      rayStartParams: {}
      # Pod template
      template:
        spec:
          volumes:  # Move this here
          - name: script-volume
            configMap:
              name: ray-script
          containers:  # Only one containers section
          - name: ray-head
            image: rayproject/ray:2.41.0
            ports:
              - containerPort: 6379
                name: gcs-server
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
            resources:
              limits:
                cpu: "1"
                memory: "1Gi"
              requests:
                cpu: "1"
                memory: "1Gi"
            volumeMounts:  # This stays in the container
            - name: script-volume
              mountPath: /app
    workerGroupSpecs:
      - replicas: 2
        minReplicas: 1
        maxReplicas: 5
        groupName: small-group
        rayStartParams: {}
        # Pod template
        template:
          spec:
            containers:
              - name: ray-worker
                image: rayproject/ray:2.41.0
                resources:
                  limits:
                    cpu: "1"
                    memory: "1Gi"
                  requests:
                    cpu: "1"
                    memory: "1Gi"
