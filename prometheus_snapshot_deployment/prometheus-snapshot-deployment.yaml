apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-snapshot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-snapshot
  template:
    metadata:
      labels:
        app: prometheus-snapshot
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - "--storage.tsdb.path=/prometheus"
          - "--web.enable-admin-api"
        ports:
          - containerPort: 9090
        volumeMounts:
          - name: prometheus-data
            mountPath: /prometheus
          - name: prometheus-config
            mountPath: /prometheus/prometheus.yml
            subPath: prometheus.yml
      volumes:
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-snapshot-pvc
        - name: prometheus-config
          configMap:
            name: prometheus-snapshot-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-snapshot
spec:
  selector:
    app: prometheus-snapshot
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090