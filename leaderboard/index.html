<!DOCTYPE html>
<html>
<head>
    <title>Results Ranking</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Results Ranking</h1>
    <table id="rankings-table">
        <tr>
        <th>Rank</th>
        <th>File</th>
        <th>F1 Score</th>
        <th>Total Energy (kWh)</th>
        <th>Carbon Footprint (gCO2e)</th>
        <th>Setup Energy (kWh)</th>
        <th>Run Energy (kWh)</th>
        <th>Deploy Energy (kWh)</th>
        <th>Total Duration (s)</th>
        </tr>
    </table>
    <script src="script.js"></script>
</body>
</html>
